<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #E2E8F0;
      min-height: 100vh;
    }

    .plugin-window {
      width: 360px;
      margin: 0 auto;
      background: #0d1117;
      min-height: 100vh;
    }

    /* TITLE BAR */
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #1e2a3a;
    }

    .title-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-bar-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #7C3AED, #06B6D4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .title-bar-name {
      font-size: 14px;
      font-weight: 600;
      color: #E2E8F0;
    }

    .close-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: none;
      color: #94A3B8;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .close-btn:hover { background: rgba(255,255,255,0.1); }

    /* MAIN CONTENT */
    .app {
      padding: 20px 16px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      position: relative;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #7C3AED, #5B21B6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 0 40px rgba(124,58,237,0.5);
      flex-shrink: 0;
    }

    .header-text .brand {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }

    .header-text .brand-white {
      color: #E2E8F0;
    }

    .header-text .brand-gradient {
      background: linear-gradient(90deg, #7C3AED, #06B6D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text .subtitle {
      font-size: 13px;
      color: #64748B;
      margin-top: 4px;
    }

    .sparkles {
      position: absolute;
      right: 0;
      top: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .sparkle-big {
      font-size: 22px;
      color: #7C3AED;
      filter: drop-shadow(0 0 6px rgba(124,58,237,0.8));
    }

    .sparkle-small {
      font-size: 13px;
      color: #7C3AED;
      opacity: 0.7;
      margin-right: 8px;
    }

    /* SECTION LABEL */
    .section-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #CBD5E1;
      margin-bottom: 10px;
    }

    .section-label .icon {
      font-size: 14px;
      color: #94A3B8;
    }

    /* CARD */
    .card {
      background: linear-gradient(180deg, rgba(22,33,55,0.9), rgba(10,18,38,0.9));
      border-radius: 14px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 6px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(124,58,237,0.2);
      color: #C4B5FD;
      border: 1px solid rgba(124,58,237,0.3);
      font-weight: 500;
    }

    /* JSON EDITOR */
    .editor-wrap {
      position: relative;
      background: #080e1a;
      border-radius: 10px;
      border: 1px solid #1a2540;
      overflow: hidden;
    }

    .editor-lines {
      display: flex;
    }

    .line-numbers {
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      background: #0a1120;
      border-right: 1px solid #1a2540;
      min-width: 32px;
      text-align: right;
    }

    .line-numbers span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #2d4060;
      line-height: 1.6;
    }

    textarea#jsonInput {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: #93C5FD;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      width: 100%;
      height: 160px;
      padding: 12px;
      line-height: 1.6;
      caret-color: #7C3AED;
    }

    textarea#jsonInput::placeholder {
      color: #1e3050;
    }

    .editor-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-top: 1px solid #1a2540;
      font-size: 11px;
      color: #3d5070;
    }

    .editor-footer .info-icon {
      margin-right: 4px;
      color: #3d5070;
    }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      gap: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #1e2d45);
    }

    .divider::after {
      background: linear-gradient(to left, transparent, #1e2d45);
    }

    .divider-pill {
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      background: #0f1826;
      border: 1px solid #1e2d45;
      border-radius: 20px;
      padding: 4px 14px;
      letter-spacing: 0.05em;
    }

    /* UPLOAD BOX */
    .upload-box {
      border: 1.5px dashed #1e3050;
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      background: rgba(8,14,26,0.7);
      box-shadow: inset 0 0 24px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 6px;
    }

    .upload-box:hover {
      border-color: #7C3AED;
      background: rgba(124,58,237,0.04);
    }

    .upload-icon {
      font-size: 34px;
      margin-bottom: 12px;
      display: block;
      filter: drop-shadow(0 0 8px rgba(124,58,237,0.5));
    }

    .upload-title {
      font-size: 14px;
      font-weight: 600;
      color: #CBD5E1;
      margin-bottom: 5px;
    }

    .upload-sub {
      font-size: 11px;
      color: #475569;
      margin-bottom: 16px;
    }

    .choose-file-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #2d4060;
      color: #94A3B8;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .choose-file-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: #7C3AED;
      color: #CBD5E1;
    }

    input[type="file"] { display: none; }

    /* CONVERT BUTTON */
    .convert-btn {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      background: linear-gradient(90deg, #7C3AED 0%, #0ea5d4 100%);
      color: white;
      margin-top: 4px;
      margin-bottom: 6px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.4), 0 2px 8px rgba(6,182,212,0.15);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
    }

    .convert-btn:hover {
      transform: scale(0.98);
      box-shadow: 0 6px 24px rgba(124,58,237,0.5);
    }

    .convert-btn:active {
      transform: scale(0.96);
    }

    .convert-btn .btn-icon {
      font-size: 16px;
    }

    /* FOOTER */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #111c2e;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #3d5070;
    }

    .footer-left .shield {
      font-size: 12px;
    }

    .footer-right {
      font-size: 11px;
      color: #3d5070;
    }
  </style>
</head>

<body>
<div class="plugin-window">

  <!-- TITLE BAR -->
  <div class="title-bar">
    <div class="title-bar-left">
      <div class="title-bar-icon">⚡</div>
      <span class="title-bar-name">TokenShift</span>
    </div>
    <button class="close-btn">✕</button>
  </div>

  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <div class="logo">⚡</div>
      <div class="header-text">
        <div class="brand">
          <span class="brand-white">Token</span><span class="brand-gradient">Shift</span>
        </div>
        <div class="subtitle">JSON to Figma Variables</div>
      </div>
      <div class="sparkles">
        <span class="sparkle-big">✦</span>
        <span class="sparkle-small">✦ ✦</span>
      </div>
    </div>

    <!-- SECTION 1: Paste JSON -->
    <div class="section-label">
      <span class="icon">📄</span>
      <span>1. Paste JSON</span>
    </div>

    <div class="card">
      <div class="card-header">
        <span style="font-size:12px; color:#64748B; display:flex; align-items:center; gap:6px;">
          <span style="font-size:13px;">📄</span> 1. Paste JSON
        </span>
        <span class="tag">Recommended</span>
      </div>

      <div class="editor-wrap">
        <div class="editor-lines">
          <div class="line-numbers" id="lineNumbers">
            <span>1</span><span>2</span><span>3</span><span>4</span>
            <span>5</span><span>6</span><span>7</span><span>8</span>
            <span>9</span><span>10</span>
          </div>
          <textarea id="jsonInput" spellcheck="false" placeholder='{ "colors": { ... } }'></textarea>
        </div>
        <div class="editor-footer">
          <span><span class="info-icon">ⓘ</span> Paste your JSON data above</span>
          <span id="charCount">0 chars</span>
        </div>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-pill">OR</div>
    </div>

    <!-- SECTION 2: Import JSON File -->
    <div class="section-label">
      <span class="icon">📄</span>
      <span>2. Import JSON File</span>
    </div>

    <label class="upload-box" for="fileInput">
      <span class="upload-icon">☁️</span>
      <div class="upload-title">Choose a JSON file or drag &amp; drop</div>
      <div class="upload-sub">Only .json files are supported</div>
      <button class="choose-file-btn" onclick="event.preventDefault(); document.getElementById('fileInput').click()">
        📄 Choose File
      </button>
    </label>
    <input type="file" id="fileInput" accept=".json" />

    <!-- SECTION 3: Convert -->
    <div class="section-label" style="margin-top: 16px;">
      <span class="icon">⚡</span>
      <span>3. Convert</span>
    </div>

    <button id="importBtn" class="convert-btn">
      <span class="btn-icon">✨</span>
      Convert to Variables
    </button>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-left">
        <span class="shield">🛡️</span>
        <span>Your data stays local. Nothing is sent anywhere.</span>
      </div>
      <div class="footer-right">v1.0.0</div>
    </div>

  </div>
</div>

<script>
  const input = document.getElementById("jsonInput");
  const fileInput = document.getElementById("fileInput");
  const button = document.getElementById("importBtn");
  const charCount = document.getElementById("charCount");
  const lineNumbers = document.getElementById("lineNumbers");

  function updateLineNumbers() {
    const lines = input.value.split('\n').length;
    const current = lineNumbers.children.length;
    if (lines > current) {
      for (let i = current + 1; i <= lines; i++) {
        const span = document.createElement('span');
        span.textContent = i;
        lineNumbers.appendChild(span);
      }
    } else if (lines < current) {
      while (lineNumbers.children.length > lines) {
        lineNumbers.removeChild(lineNumbers.lastChild);
      }
    }
  }

  input.addEventListener("input", () => {
    charCount.textContent = input.value.length + " chars";
    updateLineNumbers();
  });

  fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    input.value = text;
    charCount.textContent = text.length + " chars";
    updateLineNumbers();
  };

  // Drag and drop
  const uploadBox = document.querySelector('.upload-box');
  uploadBox.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = '#7C3AED';
    uploadBox.style.background = 'rgba(124,58,237,0.06)';
  });
  uploadBox.addEventListener('dragleave', () => {
    uploadBox.style.borderColor = '';
    uploadBox.style.background = '';
  });
  uploadBox.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = '';
    uploadBox.style.background = '';
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.json')) {
      const text = await file.text();
      input.value = text;
      charCount.textContent = text.length + " chars";
      updateLineNumbers();
    }
  });

  button.onclick = () => {
    parent.postMessage(
      { pluginMessage: { type: "IMPORT_JSON", data: input.value } },
      "*"
    );
  };
</script>
</body>
</html>
